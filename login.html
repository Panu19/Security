<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Vault - Login</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/db.js"></script>
    <script src="js/auth.js" defer></script>
</head>
<body>
    <div class="glass-panel">
        <h1 class="title">Secure Vault</h1>
        <div id="login-alert" class="alert"></div>
        <form id="login-form">
            <div class="input-group">
                <input type="text" id="username" placeholder="Username" required autocomplete="off">
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Password" required>
            </div>
            <button type="submit" class="btn">Login</button>
        </form>
        <div class="link-text">
            Don't have an account? <a href="register.html">Register here</a>
        </div>
        <div class="link-text" style="margin-top: 10px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px;">
            <a href="admin-login.html" style="color: #ffb347;">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor" style="vertical-align: middle; margin-right: 4px;">
                    <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/>
                </svg>
                Admin Portal
            </a>
        </div>
    </div>
</body>
</html>
