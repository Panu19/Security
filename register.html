<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Vault - Register</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/db.js"></script>
    <script src="js/auth.js" defer></script>
</head>
<body>
    <div class="glass-panel">
        <h1 class="title">Register Vault</h1>
        <div id="register-alert" class="alert"></div>
        <form id="register-form">
            <div class="input-group">
                <input type="email" id="reg-username" placeholder="Gmail Address (@gmail.com)" required autocomplete="off" pattern=".+@gmail\.com$">
            </div>
            <div class="input-group" style="text-align: left; margin-bottom: 20px;">
                <label style="color: rgba(255,255,255,0.7); font-size: 0.85rem; display: block; margin-bottom: 5px;">Security Question: What was the name of your first pet?</label>
                <input type="text" id="reg-security" placeholder="Security Answer" required autocomplete="off">
            </div>
            <div class="input-group">
                <input type="password" id="reg-password" placeholder="Choose Password" required>
            </div>
            <button type="submit" class="btn">Create Account</button>
        </form>
        <div class="link-text">
            Already have an account? <a href="login.html">Login here</a>
        </div>
    </div>
</body>
</html>
