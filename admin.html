<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Vault - Admin Panel</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/db.js"></script>
    <script src="js/admin.js" defer></script>
    <style>
        .admin-stats {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(0, 242, 254, 0.3);
            border-radius: 12px;
            padding: 20px;
            flex: 1;
            text-align: center;
        }
        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: #4facfe;
            margin-bottom: 5px;
        }
        .stat-label {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.7);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .users-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            overflow: hidden;
        }
        .users-table th, .users-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .users-table th {
            font-weight: 600;
            color: #00f2fe;
            background: rgba(255,255,255,0.05);
        }
        .users-table tr:hover {
            background: rgba(255,255,255,0.03);
        }
        .users-table td {
            color: rgba(255,255,255,0.9);
        }
    </style>
</head>
<body class="app-mode">
    <div class="app-container">
        <!-- Navigation -->
        <nav class="navbar">
            <div class="nav-brand" style="background: none; -webkit-text-fill-color: initial; -webkit-background-clip: initial; background-clip: initial;">
                <svg viewBox="0 0 24 24" width="28" height="28" fill="url(#adminGrad)">
                    <defs>
                        <linearGradient id="adminGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" stop-color="#ffb347" />
                            <stop offset="100%" stop-color="#ff7b00" />
                        </linearGradient>
                    </defs>
                    <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/>
                </svg>
                <span style="background: linear-gradient(to right, #ffb347, #ff7b00); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">SecureVault Admin</span>
            </div>
            <div class="nav-links">
                <a href="dashboard.html" class="btn-small btn-alt" style="text-decoration: none;">Dashboard</a>
                <button class="btn-small btn-danger" onclick="logoutUser()">Logout</button>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
             <div class="header-action">
                 <h2>System Overview</h2>
             </div>

             <!-- Stats -->
             <div class="admin-stats">
                 <div class="stat-card">
                     <div class="stat-value" id="total-users">0</div>
                     <div class="stat-label">Total Users</div>
                 </div>
                 <div class="stat-card">
                     <div class="stat-value" id="total-vaults">0</div>
                     <div class="stat-label">Configured Vaults</div>
                 </div>
             </div>

             <div class="header-action" style="margin-top: 40px;">
                 <h2>Registered Users</h2>
             </div>
             
             <!-- Users Table -->
             <div style="overflow-x: auto;">
                 <table class="users-table">
                     <thead>
                         <tr>
                             <th>Username</th>
                             <th>Vault Status</th>
                             <th>Actions</th>
                         </tr>
                     </thead>
                     <tbody id="users-tbody">
                         <!-- Users injected here -->
                         <tr>
                             <td colspan="3" style="text-align:center; color:rgba(255,255,255,0.5);">Loading users...</td>
                         </tr>
                     </tbody>
                 </table>
             </div>
        </main>
    </div>

    <script>
        function logoutUser() {
            localStorage.removeItem('isAdmin');
            window.location.href = 'admin-login.html';
        }
    </script>
</body>
</html>
